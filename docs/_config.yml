title: Introduction to GitHub
description: A complete step-by-step guide to help you start contributing on GitHub in less than an hour.
remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: light

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation
nav_sort: order

# Footer
footer_content: "Copyright &copy; 2025 GitHub &bull; <a href=\"https://www.contributor-covenant.org/version/2/1/code_of_conduct/code_of_conduct.md\">Code of Conduct</a> &bull; <a href=\"https://gh.io/mit\">MIT License</a>"

# Callouts
callouts_level: quiet
callouts:
  highlight:
    title: Highlight
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Last edit timestamp
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

# Aux links
aux_links:
  "View on GitHub":
    - "https://github.com/carebd/skills-introduction-to-github"
aux_links_new_tab: true

plugins:
  - jekyll-seo-tag

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false
