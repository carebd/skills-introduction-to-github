name: Setup exercise branch

# This workflow:
# 1. Creates the required 'my-first-branch' with PROFILE.md for the GitHub Skills exercise.
# 2. Creates sub-issues linked to issue #2 for each exercise step.
#
# Trigger manually from the Actions tab (workflow_dispatch).

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  create-my-first-branch:
    name: Create my-first-branch with PROFILE.md
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Create my-first-branch and add PROFILE.md
        run: |
          if git ls-remote --exit-code --heads origin my-first-branch; then
            echo "Branch 'my-first-branch' already exists. Skipping creation."
          else
            git checkout -b my-first-branch
            echo "Welcome to my GitHub profile!" > PROFILE.md
            git add PROFILE.md
            git commit -m "Add PROFILE.md"
            git push origin my-first-branch
            echo "Branch 'my-first-branch' created and pushed successfully."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-sub-issues:
    name: Create sub-issues for exercise issue #2
    runs-on: ubuntu-latest
    steps:
      - name: Create sub-issues for each exercise step
        uses: actions/github-script@v7
        with:
          script: |
            const steps = [
              {
                title: 'Step 1: Create a branch',
                body: 'Complete Step 1 of the Introduction to GitHub exercise:\n\n- [ ] Create a branch named `my-first-branch` from `main`.\n\nSee the parent issue #2 for full instructions.'
              },
              {
                title: 'Step 2: Commit a file',
                body: 'Complete Step 2 of the Introduction to GitHub exercise:\n\n- [ ] On branch `my-first-branch`, create a file named `PROFILE.md`.\n- [ ] Add the content: `Welcome to my GitHub profile!`\n- [ ] Commit the file with message `Add PROFILE.md`.\n\nSee the parent issue #2 for full instructions.'
              },
              {
                title: 'Step 3: Open a pull request',
                body: 'Complete Step 3 of the Introduction to GitHub exercise:\n\n- [ ] Open a pull request from `my-first-branch` to `main`.\n- [ ] Title the pull request `Add my first file`.\n- [ ] Add a description to the pull request.\n\nSee the parent issue #2 for full instructions.'
              },
              {
                title: 'Step 4: Merge your pull request',
                body: 'Complete Step 4 of the Introduction to GitHub exercise:\n\n- [ ] Merge the pull request from `my-first-branch` into `main`.\n\nSee the parent issue #2 for full instructions.'
              }
            ];

            // Check which labels exist in the repo
            const { data: repoLabels } = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const existingLabelNames = repoLabels.map(l => l.name);
            const labelsToApply = ['documentation'].filter(l => existingLabelNames.includes(l));

            for (const step of steps) {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: step.title,
                body: step.body,
                labels: labelsToApply
              });
              console.log(`Created issue #${issue.number}: ${issue.title}`);

              try {
                await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: 2,
                  sub_issue_id: issue.id
                });
                console.log(`Linked issue #${issue.number} as sub-issue of #2`);
              } catch (e) {
                console.log(`Note: Could not link #${issue.number} as sub-issue: ${e.message}`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: 2,
                  body: `Sub-issue created: #${issue.number} — ${issue.title}`
                });
              }
            }
